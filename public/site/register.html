<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Create account — TicketHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-split">
  <div class="visual">
    <div style="z-index:2;position:relative;max-width:460px">
      <a href="index.html" class="brand" style="color:#fff !important"><span class="brand-logo"><i class="bi bi-ticket-perforated-fill"></i></span>TicketHub</a>
      <h1 class="mt-5" style="color:#fff !important">Your front-row pass to everything live.</h1>
      <p class="mt-3" style="color:rgba(255,255,255,.85)">Save favorites, get presale codes, and never queue again.</p>
    </div>
  </div>
  <div class="form-side">
    <div class="auth-form fade-up in">
      <h2>Create your account</h2>
      <p class="text-muted-pro">Free forever. No credit card required.</p>
      <div class="d-grid gap-2 mt-4">
        <button class="btn btn-ghost"><i class="bi bi-google me-2"></i> Sign up with Google</button>
        <button class="btn btn-ghost"><i class="bi bi-apple me-2"></i> Sign up with Apple</button>
      </div>
      <div class="d-flex align-items-center my-4 gap-2"><hr class="flex-grow-1 m-0" style="border-color:var(--border)"/><span class="text-muted-pro small">or</span><hr class="flex-grow-1 m-0" style="border-color:var(--border)"/></div>
      <form onsubmit="event.preventDefault();tkToast('Welcome to TicketHub!');setTimeout(()=>location.href='dashboard.html',900)">
        <div class="row g-2">
          <div class="col-6"><label class="form-label">First name</label><input class="form-control" required/></div>
          <div class="col-6"><label class="form-label">Last name</label><input class="form-control" required/></div>
        </div>
        <label class="form-label mt-2">Email</label><input class="form-control" type="email" required/>
        <label class="form-label mt-2">Password</label><input class="form-control" type="password" required minlength="8" placeholder="At least 8 characters"/>
        <div class="form-check mt-3"><input class="form-check-input" type="checkbox" required><label class="form-check-label small">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label></div>
        <button class="btn btn-primary-grad w-100 mt-4 btn-lg">Create account</button>
      </form>
      <p class="text-muted-pro text-center mt-4 small">Already a member? <a href="login.html">Sign in</a></p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>
</body>
</html>
