<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="api-base" content="" />
<title>Reset Password - Event Sphere</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-split">
  <div class="visual">
    <div class="position-relative" style="z-index:2;max-width:460px">
      <a href="index.html" class="brand text-white" style="color:#fff !important"><span class="brand-logo"><i class="bi bi-ticket-perforated-fill"></i></span>Event Sphere</a>
      <h1 class="mt-5 text-white" style="color:#fff !important">Choose a new password.</h1>
      <p class="mt-3" style="color:rgba(255,255,255,.85)">Use a strong password to protect your tickets, orders, and organizer tools.</p>
    </div>
  </div>

  <div class="form-side">
    <div class="auth-form fade-up in">
      <h2>Reset Password</h2>
      <p class="text-muted-pro">Enter and confirm your new password.</p>

      <div class="alert alert-danger mt-4 d-none" role="alert" data-reset-error></div>

      <form data-reset-password-form class="mt-4">
        <input type="hidden" name="token"/>
        <input type="hidden" name="email"/>
        <label class="form-label">New Password</label>
        <input class="form-control" type="password" name="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters"/>
        <label class="form-label mt-3">Confirm Password</label>
        <input class="form-control" type="password" name="password_confirmation" required minlength="8" autocomplete="new-password"/>
        <button type="submit" class="btn btn-primary-grad w-100 mt-4 btn-lg">Update Password</button>
      </form>

      <p class="text-muted-pro text-center mt-4 small"><a href="login.html">Back to Login</a></p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api/config.js"></script>
<script src="../assets/js/api/api-client.js"></script>
<script src="../assets/js/api/auth.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/pages/reset-password-page.js"></script>
</body>
</html>
