<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="api-base" content="http://127.0.0.1:8000/api" />
<title>Checkout — TicketHub</title>
<meta name="description" content="Secure checkout for your event tickets."/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
<div data-partial="header"></div>
<script src="../assets/js/partials.js"></script>

<section class="section-sm" style="padding-top:2.5rem">
  <div class="container-xxl">
    <h1 style="font-size:2rem">Checkout</h1>

    <!-- Stepper -->
    <div class="stepper mt-4">
      <div class="step done"><div class="num"><i class="bi bi-check"></i></div><span>Tickets</span></div>
      <div class="step active"><div class="num">2</div><span>Details</span></div>
      <div class="step"><div class="num">3</div><span>Payment</span></div>
      <div class="step"><div class="num">4</div><span>Confirm</span></div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <form data-checkout-form>
        <!-- Contact -->
        <div class="card-pro p-4 mb-3">
          <h5 class="mb-3">Contact information</h5>
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">First name</label><input class="form-control" name="billing_first_name" required placeholder="Alex"/></div>
            <div class="col-md-6"><label class="form-label">Last name</label><input class="form-control" name="billing_last_name" required placeholder="Morgan"/></div>
            <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" type="email" name="billing_email" required placeholder="you@email.com"/></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" name="billing_phone" placeholder="+1 (555) 000-0000"/></div>
          </div>
        </div>

        <!-- Billing -->
        <div class="card-pro p-4 mb-3">
          <h5 class="mb-3">Billing address</h5>
          <div class="row g-3">
            <div class="col-12"><label class="form-label">Street address</label><input class="form-control" name="billing_address" placeholder="123 Sunset Blvd"/></div>
            <div class="col-md-5"><label class="form-label">City</label><input class="form-control" name="billing_city" placeholder="Los Angeles"/></div>
            <div class="col-md-4"><label class="form-label">State</label><input class="form-control" name="billing_state" placeholder="CA"/></div>
            <div class="col-md-3"><label class="form-label">ZIP</label><input class="form-control" name="billing_zip" placeholder="90028"/></div>
            <div class="col-12"><label class="form-label">Country</label>
              <input class="form-control" name="billing_country" placeholder="United States"/>
            </div>
          </div>
        </div>

        <!-- Payment -->
        <div class="card-pro p-4 mb-3">
          <h5 class="mb-3">Payment</h5>
          <div class="d-flex gap-2 mb-3 flex-wrap">
            <button class="btn btn-glass flex-grow-1" type="button" data-alt-pay="Apple Pay"><i class="bi bi-apple me-1"></i> Apple Pay</button>
            <button class="btn btn-glass flex-grow-1" type="button" data-alt-pay="Google Pay"><i class="bi bi-google me-1"></i> Google Pay</button>
            <button class="btn btn-glass flex-grow-1" type="button" data-alt-pay="PayPal"><i class="bi bi-paypal me-1"></i> PayPal</button>
          </div>
          <div class="text-center text-muted-pro small my-2">or pay with card</div>
          <div class="row g-3">
            <div class="col-12"><label class="form-label">Card number</label>
              <div class="position-relative"><input class="form-control" placeholder="1234 5678 9012 3456"/><i class="bi bi-credit-card-2-front position-absolute" style="right:14px;top:14px;color:var(--muted)"></i></div>
            </div>
            <div class="col-md-4"><label class="form-label">Expiry</label><input class="form-control" placeholder="MM/YY"/></div>
            <div class="col-md-4"><label class="form-label">CVC</label><input class="form-control" placeholder="123"/></div>
            <div class="col-md-4"><label class="form-label">Postal</label><input class="form-control" placeholder="90028"/></div>
          </div>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <a class="btn btn-ghost" href="event-details.html"><i class="bi bi-arrow-left me-1"></i> Back</a>
          <div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="refund_protection" value="1"><label class="form-check-label small">Add refund protection · $4.99</label></div>
          <button type="button" class="btn btn-primary-grad btn-lg" data-checkout-pay>Pay <i class="bi bi-lock-fill ms-1"></i></button>
        </div>
        </form>
      </div>

      <!-- Order summary -->
      <div class="col-lg-4">
        <div class="sticky-checkout">
          <div class="card-pro p-4" data-checkout-summary>
            <h6 class="mb-3">Order summary</h6>
            <p class="text-muted-pro small">Loading cart…</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div data-partial="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api/config.js"></script>
<script src="../assets/js/api/api-client.js"></script>
<script src="../assets/js/api/auth.js"></script>
<script src="../assets/js/api/utils.js"></script>
<script src="../assets/js/api/cart.js"></script>
<script src="../assets/js/api/orders.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/pages/checkout-page.js"></script>
</body>
</html>
