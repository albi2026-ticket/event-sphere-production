<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="api-base" content="http://127.0.0.1:8000/api" />
<title>Sign in — TicketHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-split">
  <div class="visual">
    <div class="position-relative" style="z-index:2;max-width:460px">
      <a href="index.html" class="brand text-white" style="color:#fff !important"><span class="brand-logo"><i class="bi bi-ticket-perforated-fill"></i></span>TicketHub</a>
      <h1 class="mt-5 text-white" style="color:#fff !important">The world's biggest stage, in your pocket.</h1>
      <p class="mt-3" style="color:rgba(255,255,255,.85)">Join 12 million fans booking the best seats with one tap.</p>
      <div class="d-flex gap-3 mt-4">
        <div class="glass p-3" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)"><div class="fw-bold fs-4 text-white">4.9★</div><small style="color:rgba(255,255,255,.8)">App Store</small></div>
        <div class="glass p-3" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)"><div class="fw-bold fs-4 text-white">100%</div><small style="color:rgba(255,255,255,.8)">Refund guarantee</small></div>
      </div>
    </div>
  </div>

  <div class="form-side">
    <div class="auth-form fade-up in">
      <h2>Welcome back</h2>
      <p class="text-muted-pro">Sign in to access your tickets, favorites and resale.</p>

      <div class="d-grid gap-2 mt-4">
        <button class="btn btn-ghost"><i class="bi bi-google me-2"></i> Continue with Google</button>
        <button class="btn btn-ghost"><i class="bi bi-apple me-2"></i> Continue with Apple</button>
      </div>
      <div class="d-flex align-items-center my-4 gap-2">
        <hr class="flex-grow-1 m-0" style="border-color:var(--border)"/>
        <span class="text-muted-pro small">or</span>
        <hr class="flex-grow-1 m-0" style="border-color:var(--border)"/>
      </div>
      <form data-login-form>
        <label class="form-label">Email</label>
        <input class="form-control mb-3" type="email" name="email" required placeholder="you@email.com"/>
        <div class="d-flex justify-content-between"><label class="form-label">Password</label><a href="#" class="small">Forgot?</a></div>
        <input class="form-control" type="password" name="password" required placeholder="••••••••"/>
        <div class="form-check mt-3"><input class="form-check-input" type="checkbox" checked><label class="form-check-label small">Keep me signed in</label></div>
        <button type="submit" class="btn btn-primary-grad w-100 mt-4 btn-lg">Sign in</button>
      </form>
      <p class="text-muted-pro text-center mt-4 small">New here? <a href="register.html">Create an account</a></p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api/config.js"></script>
<script src="../assets/js/api/api-client.js"></script>
<script src="../assets/js/api/auth.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/pages/login-page.js"></script>
</body>
</html>
